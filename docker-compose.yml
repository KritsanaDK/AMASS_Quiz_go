services:
  postgres:
    image: postgres:16-alpine
    container_name: amass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./build/amass/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d amass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
